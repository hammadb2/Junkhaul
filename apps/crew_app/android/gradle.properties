org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# AGP 9.0 enforces unique package names across all libraries by default.
# The Google Play Services Cronet artifacts (cronet-api, cronet-fallback,
# cronet-common at 119.6045.31) all share the org.chromium.net namespace,
# which trips this enforcement during manifest merge. Disable until the
# upstream Cronet AARs are republished with unique namespaces.
# See: https://issues.chromium.org/issues/406926302
android.uniquePackageNames=false
