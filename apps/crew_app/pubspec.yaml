  sentry_flutter: 9.23.0
  permission_handler: ^12.0.3
  workmanager: ^0.9.0+3
  intl: ^0.20.3
  url_launcher: ^6.3.2
  package_info_plus: ^10.2.0
  flutter_secure_storage: ^10.3.1
  path_provider: ^2.1.6
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: 2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  mockito: ^5.6.4
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 24
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon.png
