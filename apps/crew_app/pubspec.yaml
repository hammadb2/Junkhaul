    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  dio: ^5.10.0
  supabase_flutter: 2.15.4
  mapbox_maps_flutter: 2.25.1
  flutter_mapbox_animarker: ^0.0.10
  google_maps_flutter: ^2.17.1
  google_navigation_flutter: ^0.10.0
  geolocator: ^14.0.3
  flutter_foreground_task: ^9.2.2
  flutter_compass: ^0.8.1
  sliding_up_panel2: ^3.3.0+1
  shimmer: ^3.0.0
  flutter_svg: ^2.3.0
  cached_network_image: ^3.4.1
  signature: ^6.3.0
  flutter_animate: ^4.5.2
  confetti: ^0.8.0
  google_fonts: ^8.1.0
  camera: ^0.12.0+1
  image_picker: ^1.1.2
  image: ^4.9.1
